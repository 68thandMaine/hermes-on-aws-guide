apiVersion: v1
kind: Service
metadata:
  name: hermes-api
  namespace: {{ .Values.namespace }}
  labels:
    app: hermes-api
    app.kubernetes.io/component: api
spec:
  selector:
    app: hermes-api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
