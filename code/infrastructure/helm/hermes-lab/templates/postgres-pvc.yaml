apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-postgres-data
  namespace: {{ .Values.namespace }}
  labels:
    app: hermes-postgres
    app.kubernetes.io/part-of: hermes-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.postgres.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
