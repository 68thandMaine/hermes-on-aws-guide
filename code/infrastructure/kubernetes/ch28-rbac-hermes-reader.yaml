# Chapter 28 — RBAC: read-only Pod access for hermes-reader
# Apply: kubectl apply -f code/infrastructure/kubernetes/ch28-rbac-hermes-reader.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-reader
  namespace: default
  labels:
    app.kubernetes.io/part-of: hermes-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-reader-pod-reader
  namespace: default
subjects:
  - kind: ServiceAccount
    name: hermes-reader
    namespace: default
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
