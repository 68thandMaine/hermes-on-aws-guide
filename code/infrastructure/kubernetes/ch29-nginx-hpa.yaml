# Chapter 29 — HPA for nginx-deployment (CPU utilization)
# Prerequisites:
#   nginx-deployment Running with CPU requests (see chapter walkthrough)
# Apply: kubectl apply -f code/infrastructure/kubernetes/ch29-nginx-hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
