# Chapter 34 — emits structured JSON logs to stdout (Promtail → Loki)
apiVersion: v1
kind: Pod
metadata:
  name: structured-log-demo
  namespace: default
  labels:
    app: hermes-log-demo
spec:
  restartPolicy: Never
  containers:
    - name: demo
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          TRACE_ID="trace-$(date +%s)"
          for i in 1 2 3 4 5; do
            echo "{\"level\":\"info\",\"event\":\"tool_call\",\"tool\":\"weather_api\",\"latency_ms\":$((100+i*30)),\"trace_id\":\"$TRACE_ID\",\"request_id\":\"req-$i\"}"
            sleep 2
          done
          echo "{\"level\":\"error\",\"event\":\"tool_call\",\"tool\":\"weather_api\",\"error\":\"timeout\",\"trace_id\":\"$TRACE_ID\",\"request_id\":\"req-6\"}"
          sleep 3600
