# Chapter 33 — optional Grafana Tempo (tracing backend, lab)
# Install after logging stack:
#   helm upgrade --install tempo grafana/tempo \
#     -n logging --create-namespace \
#     -f infrastructure/helm/tempo/values-k3s-lab.yaml
# Add Tempo datasource in Grafana (Ch 32) — URL http://tempo.logging.svc:3100

tempo:
  retention: 24h
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

persistence:
  enabled: false
