# Chapter 37 — llama.cpp with CUDA on GPU-labeled k3s node
# Prerequisite: NVIDIA driver + nvidia-container-toolkit + device plugin (see ch37-gpu-node-prep.sh)
# Install as second release alongside CPU llama-server:
#   helm upgrade --install llama-server-gpu infrastructure/helm/llama-server \
#     -n hermes -f infrastructure/helm/llama-server/values-gpu.yaml

namespace: hermes

image:
  repository: ghcr.io/ggerganov/llama.cpp
  tag: server-cuda
  pullPolicy: IfNotPresent

replicaCount: 1

model:
  file: /models/model.gguf
  hostPath: /models

server:
  port: 8080
  contextSize: 4096
  parallel: 2

service:
  name: llama-server-gpu
  port: 8080

runtimeClassName: nvidia

nodeSelector:
  accelerator: nvidia

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

resources:
  requests:
    cpu: 1000m
    memory: 8Gi
    nvidia.com/gpu: 1
  limits:
    cpu: 4000m
    memory: 16Gi
    nvidia.com/gpu: 1
