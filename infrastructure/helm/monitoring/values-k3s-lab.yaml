# Chapter 32 — kube-prometheus-stack values for single-node k3s on EC2
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f infrastructure/helm/monitoring/values-k3s-lab.yaml

# Lab sizing — m7i.2xlarge has headroom; tune down on smaller instances
prometheus:
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    # k3s lab: local-path PVC optional; emptyDir acceptable for learning
    storageSpec: {}

grafana:
  enabled: true
  adminPassword: changeme-use-secret-in-prod
  service:
    type: ClusterIP
  defaultDashboardsEnabled: true

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# kube-prometheus-stack ships default PrometheusRules for Kubernetes
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    node: true
    prometheus: true

# Do not scrape the whole internet — cluster-local only
prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true

kube-state-metrics:
  prometheus:
    monitor:
      enabled: true
