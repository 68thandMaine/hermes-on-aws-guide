# Chapter 33 — Loki stack for single-node k3s (lab)
# Reuses Grafana from Chapter 32 (grafana.enabled: false here).
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm upgrade --install logging grafana/loki-stack \
#     -n logging --create-namespace \
#     -f infrastructure/helm/logging/values-k3s-lab.yaml

loki:
  enabled: true
  persistence:
    enabled: false
  config:
    limits_config:
      retention_period: 72h
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8
    chunk_store_config:
      max_look_back_period: 72h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 72h
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Use monitoring Grafana from Ch 32 — add Loki datasource manually or via ConfigMap
grafana:
  enabled: false

fluent-bit:
  enabled: false

logstash:
  enabled: false

filebeat:
  enabled: false

prometheus:
  enabled: false
