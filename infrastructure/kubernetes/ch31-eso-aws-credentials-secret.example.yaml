# Chapter 31 — ESO AWS credentials (LAB ONLY — do not commit real keys)
# 1. Copy to ch31-eso-aws-credentials-secret.yaml (gitignored pattern: use local file)
# 2. Replace placeholders with hermes-eso IAM user keys (scoped policy in modules/secrets/)
# 3. kubectl apply -f ch31-eso-aws-credentials-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: eso-aws-credentials
  namespace: external-secrets
type: Opaque
stringData:
  access-key: REPLACE_WITH_HERMES_ESO_ACCESS_KEY
  secret-access-key: REPLACE_WITH_HERMES_ESO_SECRET_KEY
