# Chapter 41 — Hermes namespace network segmentation
# Model servers and databases stay internal; only API receives Ingress traffic.
# Prerequisite: hermes-lab release in namespace hermes (Ch 34)
# Note: k3s CNI enforcement varies — see Chapter 27 troubleshooting.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-default-deny-ingress
  namespace: hermes
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-api-ingress
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes-api
  policyTypes:
    - Ingress
  ingress:
    # Traefik Ingress controller (k3s default)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-worker-egress
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes-workers
  policyTypes:
    - Egress
  egress:
    # Redis, Postgres, model inference — in-namespace only
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: hermes-platform
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-model-no-ingress
  namespace: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes-model
  policyTypes:
    - Ingress
  ingress:
    # Only workers (and API if needed) may call inference
    - from:
        - podSelector:
            matchLabels:
              app: hermes-workers
        - podSelector:
            matchLabels:
              app: hermes-api
      ports:
        - protocol: TCP
          port: 8080
