# Chapter 22 — ClusterIP Service for nginx-deployment
# Prerequisite: kubectl apply -f infrastructure/kubernetes/ch21-nginx-deployment.yaml
# Apply: kubectl apply -f infrastructure/kubernetes/ch22-nginx-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
