# Chapter 31 — ClusterSecretStore for AWS Secrets Manager
# Prerequisites:
#   - External Secrets Operator installed (helm install external-secrets ...)
#   - eso-aws-credentials Secret in external-secrets namespace (from .example.yaml)
# k3s on EC2: Pods do not inherit the EC2 instance profile — ESO uses secretRef auth in this lab.
# EKS production path: replace auth block with IRSA (serviceAccountRef + OIDC).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: eso-aws-credentials
            key: access-key
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: eso-aws-credentials
            key: secret-access-key
            namespace: external-secrets
