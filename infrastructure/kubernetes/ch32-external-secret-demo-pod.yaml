# Chapter 32 — Pod consuming externally synced secret
# Prerequisites: ExternalSecret hermes-api-secret synced (kubectl get externalsecret)
apiVersion: v1
kind: Pod
metadata:
  name: external-secret-demo
  labels:
    app: external-secret-demo
spec:
  restartPolicy: Never
  containers:
    - name: demo
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "API_KEY length: $(echo -n "$API_KEY" | wc -c)"
          echo "(value not printed — verify non-empty)"
          sleep 3600
      env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-api-secret
              key: API_KEY
