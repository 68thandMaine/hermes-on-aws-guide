# Chapter 27 — NetworkPolicy: only Pods labeled access=frontend may reach nginx:80
# Prerequisite: nginx workload with label app=nginx (Ch 21–25)
# Apply: kubectl apply -f infrastructure/kubernetes/ch27-networkpolicy-nginx.yaml
# Note: enforcement depends on k3s CNI — see Chapter 27 troubleshooting.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-frontend-only
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              access: frontend
      ports:
        - protocol: TCP
          port: 80
