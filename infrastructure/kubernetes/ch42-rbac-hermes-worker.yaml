# Chapter 42 — Worker ServiceAccount: no Kubernetes Secret access
# Workers mediate tools; they must not list cluster Secrets via the API.
# Apply: kubectl apply -f infrastructure/kubernetes/ch42-rbac-hermes-worker.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-worker
  namespace: hermes
  labels:
    app.kubernetes.io/part-of: hermes-platform
    app.kubernetes.io/component: worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-worker-minimal
  namespace: hermes
rules:
  # Workers may read ConfigMaps (tool policy) but not Secrets via API
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-worker-minimal
  namespace: hermes
subjects:
  - kind: ServiceAccount
    name: hermes-worker
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-worker-minimal
  apiGroup: rbac.authorization.k8s.io
