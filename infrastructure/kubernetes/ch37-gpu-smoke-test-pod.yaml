# Chapter 37 — smoke test: schedule a Pod requesting one GPU
# Prerequisites: device plugin + labeled GPU node
apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke-test
  namespace: hermes
spec:
  restartPolicy: Never
  nodeSelector:
    accelerator: nvidia
  runtimeClassName: nvidia
  containers:
    - name: cuda-test
      image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda11.6.0
      resources:
        limits:
          nvidia.com/gpu: 1
