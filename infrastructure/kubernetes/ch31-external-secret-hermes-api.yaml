# Chapter 31 — sync hermes/api-key from AWS Secrets Manager into Kubernetes
# Prerequisites: ch31-cluster-secret-store.yaml, secret hermes/api-key in AWS SM
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hermes-api-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: hermes-api-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: hermes/api-key
